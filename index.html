<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Realm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="background-glow background-glow-a"></div>
  <div class="background-glow background-glow-b"></div>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Partner Management System</p>
        <h1>Partner Realm</h1>
        <p class="hero-copy">

      <div class="hero-actions">
        <span class="badge">Cloudflare Pages Ready</span>
        <span class="badge">Supabase Auth + Storage</span>
      </div>
    </header>

    <main id="app" class="layout">
      <section class="panel panel-loading">
        <p>Initializing the system...</p>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
